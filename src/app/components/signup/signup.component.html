<div class="auth-container">
  <div class="glass-card">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Start your healthy journey today</p>
    </div>

    <form (submit)="onSignup()">
      <div class="form-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" [(ngModel)]="signupData.fullName" name="fullName" class="form-control" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="signupData.email" name="email" class="form-control" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
          <label>Username</label>
          <input type="text" [(ngModel)]="signupData.username" name="username" class="form-control" placeholder="johndoe123" required>
        </div>

        <div class="form-group">
          <label>Gender</label>
          <select [(ngModel)]="signupData.gender" name="gender" class="form-control" required>
            <option value="MALE">Male</option>
            <option value="FEMALE">Female</option>
            <option value="OTHER">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" [(ngModel)]="signupData.dateOfBirth" name="dob" class="form-control" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="signupData.password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Creating Account...' : 'Get Started' }}
      </button>

      <div class="auth-footer">
        Already have an account? <a routerLink="/login">Log In</a>
      </div>
    </form>
  </div>
</div>
