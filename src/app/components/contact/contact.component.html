<div class="contact-container section-padding">
  <div class="container">
    <div class="contact-grid">
      <div class="contact-info">
        <h1>Connect with us</h1>
        <p>Your journey to healthy eating starts here. Follow us on social media for daily tips and delicious updates!</p>
        
        <div class="social-links mt-30">
          <a href="https://www.linkedin.com/in/shivani-m-b40684253/" target="_blank" class="social-item">
            <i class="fab fa-linkedin"></i>
            <div>
              <h3>LinkedIn</h3>
              <p>Professional Profile</p>
            </div>
          </a>

          <a href="https://github.com/Shivani-m26" target="_blank" class="social-item">
            <i class="fab fa-github"></i>
            <div>
              <h3>GitHub</h3>
              <p>Source Code & Projects</p>
            </div>
          </a>

          <div class="social-item">
             <i class="fas fa-envelope"></i>
             <div>
               <h3>Support Email</h3>
               <p class="mt-10">📧 shivanimanivannan1&#64;gmail.com</p>
             </div>
          </div>
        </div>
      </div>

      <div class="contact-form glass-card">
        <form #contactForm="ngForm" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-control" [(ngModel)]="contactData.name" name="name" required placeholder="John Doe">
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="form-control" [(ngModel)]="contactData.email" name="email" required placeholder="john@example.com">
          </div>

          <div class="form-group">
            <label>Subject</label>
            <input type="text" class="form-control" [(ngModel)]="contactData.subject" name="subject" required placeholder="Question about Plans">
          </div>

          <div class="form-group">
            <label>Message</label>
            <textarea class="form-control" [(ngModel)]="contactData.message" name="message" required rows="5" placeholder="Tell us more..."></textarea>
          </div>

          <button type="submit" class="btn-primary" [disabled]="submitted">
            {{ submitted ? 'Sending...' : 'Send Message' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>
