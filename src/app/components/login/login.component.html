<div class="auth-container">
  <div class="glass-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Log in to manage your feast</p>
    </div>

    <form (submit)="onLogin()">
      <div class="form-group">
        <label>Username or Email</label>
        <input type="text" [(ngModel)]="loginData.usernameOrEmail" name="username" class="form-control" placeholder="Enter your credentials" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="loginData.password" name="password" class="form-control" placeholder="••••••••" required>
      </div>

      <div class="auth-options">
        <a routerLink="/forgot-password">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Sign In' }}
      </button>

      <div class="auth-footer">
        Don't have an account? <a routerLink="/signup">Sign Up</a>
      </div>
    </form>
    
    <div *ngIf="error" class="error-msg">{{error}}</div>
  </div>
</div>
