<div class="auth-container">
  <div class="glass-card">
    <div class="auth-header">
      <h2>Reset Password</h2>
      <p>Secure your FreshFeast account</p>
    </div>

    <form *ngIf="!token" (submit)="onRequestReset()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="email" name="email" class="form-control" placeholder="Enter your email" required>
      </div>
      <button type="submit" class="btn-primary">Send Reset Token</button>
    </form>

    <div *ngIf="tokenGenerated" class="token-display">
      <p>A reset token has been generated (Mock):</p>
      <code>{{tokenGenerated}}</code>
    </div>

    <form *ngIf="tokenGenerated" (submit)="onReset()">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" [(ngModel)]="newPassword" name="newPass" class="form-control" required>
      </div>
      <button type="submit" class="btn-primary">Update Password</button>
    </form>

    <div class="auth-footer">
       Remember it? <a routerLink="/login">Back to Login</a>
    </div>
  </div>
</div>
