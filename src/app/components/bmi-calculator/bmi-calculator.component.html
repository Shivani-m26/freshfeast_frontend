<div class="calculator-container">
  <div class="glass-card wide">
    <div class="calc-header">
      <h1>BMI & Healthy Weight Calculator</h1>
      <p>Enter your details to find your Body Mass Index and nutrition suggestions.</p>
    </div>

    <div class="calc-grid">
      <div class="inputs">
        <div class="form-group">
          <label>Gender</label>
          <div class="gender-selection">
            <button [class.active]="calcData.gender === 'MALE'" (click)="calcData.gender = 'MALE'">👨 Male</button>
            <button [class.active]="calcData.gender === 'FEMALE'" (click)="calcData.gender = 'FEMALE'">👩 Female</button>
          </div>
        </div>

        <div class="form-group">
          <label>Age</label>
          <input type="number" [(ngModel)]="calcData.age" class="form-control" placeholder="Years">
        </div>

        <div class="form-group">
          <label>Height (cm)</label>
          <input type="number" [(ngModel)]="calcData.height" class="form-control" placeholder="170">
        </div>

        <div class="form-group">
          <label>Weight (kg)</label>
          <input type="number" [(ngModel)]="calcData.weight" class="form-control" placeholder="70">
        </div>

        <button class="btn-primary" (click)="calculate()">Calculate Now</button>
      </div>

      <div class="result-area" *ngIf="result">
        <div class="bmi-score">
          <span class="score">{{result.bmi}}</span>
          <span class="cat" [ngClass]="result.bmiCategory.toLowerCase()">{{result.bmiCategory}}</span>
        </div>
        
        <div class="suggestion-box">
          <h3>Daily Calorie Target:</h3>
          <p class="calories">{{result.suggestedCalories}} kcal</p>
          <p class="description">{{result.suggestion}}</p>
        </div>

        <div class="bmi-scale">
          <div class="bar">
            <div class="marker" [style.left.%]="getMarkerPos()"></div>
          </div>
          <div class="labels">
            <span>18.5</span>
            <span>25</span>
            <span>30</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
